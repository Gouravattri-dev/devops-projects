name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'devops-project'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install django==4.2

    - name: Check Django version
      run: python -m django --version

    - name: Run Bash script
      run: |
        chmod +x system_info.sh
        bash system_info.sh

    - name: Print environment info
      run: |
        echo "App Name is devops-project"
        echo "Python version is 3.11"
        echo "Pipeline is working!"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install django==4.2

    - name: Check project structure
      run: |
        echo "Project files:"
        ls -la
        echo "Build check passed!"

    - name: Success
      run: echo "All jobs passed! App is ready!"
